<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock Download - Enroute Store</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        body { 
            padding-top: 70px; 
            background: linear-gradient(135deg, #f6f8fd 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: var(--font-sans);
        }

        .header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .page-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .unlock-card {
            width: 100%;
            max-width: 520px;
            background: #ffffff;
            padding: 3rem 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0, 0, 0, 0.02);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Decorative top border gradient */
        .unlock-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4f46e5, #ec4899);
        }

        .icon-wrapper {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            color: #4f46e5;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.5);
            border: 1px solid #c7d2fe;
        }

        .icon-wrapper svg {
            width: 32px;
            height: 32px;
            stroke-width: 2.5;
        }

        .unlock-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .mod-subtitle {
            font-size: 0.95rem;
            color: #64748b;
            margin-bottom: 2.5rem;
            font-weight: 500;
        }

        .steps-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .step-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem;
            border-radius: 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .step-row.active {
            background: #ffffff;
            border-color: #cbd5e1;
            box-shadow: 0 4px 12px -4px rgba(0,0,0,0.05);
        }

        .step-row.disabled {
            opacity: 0.5;
            pointer-events: none;
            background: #f1f5f9;
        }

        .step-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-align: left;
        }

        .step-number {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: #eef2ff;
            color: #4f46e5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
        }

        .step-row.completed .step-number {
            background: #dcfce7;
            color: #16a34a;
        }

        .step-text h4 {
            margin: 0;
            color: #1e293b;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .step-text p {
            margin: 0.2rem 0 0 0;
            color: #64748b;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .btn-action {
            padding: 0.6rem 1.25rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-youtube {
            background: #ef4444;
            color: #ffffff;
            box-shadow: 0 4px 10px -2px rgba(239, 68, 68, 0.4);
        }

        .btn-youtube:hover {
            background: #dc2626;
            transform: translateY(-1px);
        }

        .btn-completed {
            background: #10b981;
            color: #ffffff;
            pointer-events: none;
        }

        .btn-download {
            background: #4f46e5;
            color: #ffffff;
            box-shadow: 0 4px 10px -2px rgba(79, 70, 229, 0.4);
        }

        .btn-download:hover:not(:disabled) {
            background: #4338ca;
            transform: translateY(-1px);
        }

        .btn-download:disabled {
            background: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
            color: #f1f5f9;
        }

        .timer-status {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #ec4899;
            font-weight: 600;
            display: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        @media (max-width: 500px) {
            .step-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 1.25rem;
            }
            .btn-action {
                width: 100%;
                justify-content: center;
            }
            .unlock-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
    <link rel="icon" type="image/png" href="assets/images/fevicon.png">
</head>
<body>

    <header class="header">
        <div class="container nav">
            <a href="index.html" class="logo">Enroute<span>.</span></a>
        </div>
    </header>

    <div class="page-wrapper">
        <div class="unlock-card" id="unlock-ui">
            <div class="icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            
            <h1 class="unlock-title">Unlock Download</h1>
            <p class="mod-subtitle" id="mod-name">Loading mod details...</p>

            <div class="steps-container">
                <!-- Step 1 -->
                <div class="step-row active" id="step-1">
                    <div class="step-left">
                        <div class="step-number" id="step-1-num">1</div>
                        <div class="step-text">
                            <h4>Subscribe & Support</h4>
                            <p>Verify subscription to continue</p>
                        </div>
                    </div>
                    <button class="btn-action btn-youtube" id="btn-subscribe">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02" fill="#fff"/></svg>
                        Subscribe
                    </button>
                </div>

                <!-- Step 2 -->
                <div class="step-row disabled" id="step-2">
                    <div class="step-left">
                        <div class="step-number" id="step-2-num">2</div>
                        <div class="step-text">
                            <h4>Get Link</h4>
                            <p>Ready to download</p>
                        </div>
                    </div>
                    <button class="btn-action btn-download" id="btn-get-link" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Download
                    </button>
                </div>
            </div>
            
            <div class="timer-status" id="status-message">
                Please wait 10 seconds...
            </div>
        </div>
    </div>

    <!-- Logic -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/sub2unlock.js"></script>
</body>
</html>
