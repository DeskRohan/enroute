<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Enroute Store</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <aside class="admin-sidebar">
        <div class="admin-logo">
            Enroute<span>Admin</span>
        </div>
        <ul class="admin-nav">
            <li><a href="dashboard.html" class="active">Dashboard</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="orders.html">Orders</a></li>
            <li><a href="users.html">Users</a></li>
        </ul>
        <div style="padding: var(--spacing-4); margin-top: auto;">
            <button class="btn btn-outline" style="width: 100%;" id="admin-logout-btn">Logout</button>
        </div>
    </aside>

    <main class="admin-main">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-8);">
            <h1>Dashboard Overview</h1>
            <a href="../index.html" class="btn btn-outline" target="_blank">View Storefront</a>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Total Revenue</div>
                <div class="stat-value" id="stat-revenue">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Total Orders</div>
                <div class="stat-value" id="stat-orders">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Products</div>
                <div class="stat-value" id="stat-products">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Registered Users</div>
                <div class="stat-value" id="stat-users">0</div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr; gap: var(--spacing-8);">
            <!-- Recent Orders -->
            <div class="card" style="padding: var(--spacing-6);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-4);">
                    <h3>Recent Orders</h3>
                    <a href="orders.html" class="text-secondary" style="font-size: 0.875rem;">View All</a>
                </div>
                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Product</th>
                                <th>Amount</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="recent-orders-body">
                            <tr><td colspan="5" class="text-center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Logic -->
    <script type="module">
        import { requireAdmin } from '../js/admin/admin-auth.js';
        requireAdmin();
    </script>
    <script type="module" src="../js/admin/admin-dashboard.js"></script>
</body>
</html>
