            <li><a href="products.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg> <span class="nav-text">Products</span></a></li>

        </ul>
    </aside>

    <main class="admin-main">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-8);">
            <h1>Order Management</h1>
            <button class="btn btn-primary" id="export-csv-btn">Export CSV</button>
        </div>

        <!-- Filters -->
        <div style="display: flex; gap: var(--spacing-4); margin-bottom: var(--spacing-6);">
            <input type="text" id="search-order" class="form-control" placeholder="Search by Order ID or Email" style="max-width: 300px;">
        </div>

        <div class="table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer Name</th>
                        <th>Email</th>
                        <th>Product</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="orders-table-body">
                    <tr><td colspan="7" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Logic -->
    <script type="module">
        import { requireAdmin } from '../js/admin/admin-auth.js';
        requireAdmin();
    </script>
    <script type="module" src="../js/admin/admin-orders.js"></script>
</body>
</html>
