<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Enroute Admin</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="icon" type="image/png" href="../assets/images/fevicon.png">
    <style>
        .filter-row {
            display: flex;
            gap: var(--spacing-4);
            margin-bottom: var(--spacing-6);
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
            min-width: 200px;
        }
        .filter-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .date-inputs {
            display: flex;
            gap: var(--spacing-4);
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="mobile-admin-header">
        <div class="admin-logo" style="border: none; padding: 0;">Enroute<span>Admin</span></div>
    </div>

    <aside class="admin-sidebar">
        <div class="admin-logo">
            Enroute<span>Admin</span>
        </div>
        <ul class="admin-nav">
            <li><a href="dashboard.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> <span class="nav-text">Dashboard</span></a></li>
            <li><a href="products.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg> <span class="nav-text">Products</span></a></li>
            <li><a href="orders.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> <span class="nav-text">Orders</span></a></li>
            <li><a href="users.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg> <span class="nav-text">Users</span></a></li>
            <li><a href="reports.html" class="active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg> <span class="nav-text">Reports</span></a></li>
            <li><a href="account.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg> <span class="nav-text">Account</span></a></li>
        </ul>
    </aside>

    <main class="admin-main">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-8);">
            <h1>Revenue Reports</h1>
            <button class="btn btn-primary" id="export-pdf-btn" disabled>Export Report (PDF)</button>
        </div>

        <div class="card" style="padding: var(--spacing-6); margin-bottom: var(--spacing-8);">
            <h3>Filter Data</h3>
            <div class="filter-row" style="margin-top: 1rem;">
                <div class="filter-group">
                    <label for="filter-product">Select Mod / Product</label>
                    <select id="filter-product" class="form-control">
                        <option value="all">All Products</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filter-time">Time Period</label>
                    <select id="filter-time" class="form-control">
                        <option value="all_time">All Time (Launch to Today)</option>
                        <option value="last_30">Last 30 Days</option>
                        <option value="last_7">Last 7 Days</option>
                        <option value="custom">Custom Date Range</option>
                    </select>
                </div>

                <div class="filter-group date-inputs" id="custom-date-group" style="display: none;">
                    <div style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                        <label for="date-start">Start Date</label>
                        <input type="date" id="date-start" class="form-control">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                        <label for="date-end">End Date</label>
                        <input type="date" id="date-end" class="form-control">
                    </div>
                </div>
                
                <div>
                    <button class="btn btn-accent" id="generate-btn" style="height: 46px;">Generate</button>
                </div>
            </div>
        </div>

        <div class="stats-grid" style="margin-bottom: var(--spacing-8);">
            <div class="stat-card">
                <div class="stat-title">Total Revenue (Filtered)</div>
                <div class="stat-value" id="summary-revenue">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Total Units Sold</div>
                <div class="stat-value" id="summary-units">0</div>
            </div>
        </div>

        <div class="table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Pricing Type</th>
                        <th>Units Sold</th>
                        <th>Total Revenue Generated</th>
                    </tr>
                </thead>
                <tbody id="reports-table-body">
                    <tr><td colspan="4" class="text-center text-secondary">Select filters and click Generate to view report.</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <!-- Logic -->
    <script type="module">
        import { requireAdmin } from '../js/admin/admin-auth.js';
        requireAdmin();
    </script>
    <script type="module" src="../js/admin/admin-reports.js"></script>
</body>
</html>
