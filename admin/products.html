<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="icon" type="image/png" href="../assets/images/fevicon.png">
</head>

<body>

    <div class="mobile-admin-header">
        <div class="admin-logo" style="border: none; padding: 0;">Enroute<span>Admin</span></div>
    </div>

    <aside class="admin-sidebar">
        <div class="admin-logo">
            Enroute<span>Admin</span>
        </div>
        <ul class="admin-nav">
            <li><a href="dashboard.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> <span class="nav-text">Dashboard</span></a></li>
            <li><a href="products.html" class="active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg> <span class="nav-text">Products</span></a></li>
            <li><a href="orders.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> <span class="nav-text">Orders</span></a></li>
            <li><a href="users.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg> <span class="nav-text">Users</span></a></li>
            <li><a href="reports.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg> <span class="nav-text">Reports</span></a></li>
            <li><a href="account.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg> <span class="nav-text">Account</span></a></li>
        </ul>
    </aside>

    <main class="admin-main">
        <div
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-8);">
            <h1>Manage Products</h1>
            <button class="btn btn-primary" id="add-product-btn">+ Add Product</button>
        </div>

        <div class="table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Featured</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="products-table-body">
                    <tr>
                        <td colspan="6" class="text-center">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Product Modal -->
    <div class="modal-overlay" id="product-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add Product</h3>
                <button class="close-btn" id="close-modal-btn">&times;</button>
            </div>
            <form id="product-form">
                <input type="hidden" id="product-id">

                <div class="form-group">
                    <label class="form-label">Product Name</label>
                    <input type="text" id="p-name" class="form-control" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-4);">
                    <div class="form-group">
                        <label class="form-label">Pricing Type</label>
                        <select id="p-pricing-type" class="form-control" required>
                            <option value="paid">Paid</option>
                            <option value="free">Free (Sub2Unlock)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select id="p-category" class="form-control" required>
                            <option value="mod">Mod</option>
                            <option value="livery">Livery</option>
                            <option value="map">Map</option>
                        </select>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr; gap: var(--spacing-4);">
                    <div class="form-group" id="price-group">
                        <label class="form-label">Price (INR)</label>
                        <input type="number" id="p-price" class="form-control" min="0" required>
                    </div>
                    <div class="form-group" id="channel-link-group" style="display: none;">
                        <label class="form-label">YouTube Channel Link</label>
                        <input type="url" id="p-channel-link" class="form-control" placeholder="https://youtube.com/@channel">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Product Images (URLs)</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-4); margin-bottom: 0.5rem;">
                        <input type="url" id="p-image-1" class="form-control" placeholder="Image 1 URL (Primary)" required>
                        <input type="url" id="p-image-2" class="form-control" placeholder="Image 2 URL (Optional)">
                        <input type="url" id="p-image-3" class="form-control" placeholder="Image 3 URL (Optional)">
                        <input type="url" id="p-image-4" class="form-control" placeholder="Image 4 URL (Optional)">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Download Link (Google Drive, MediaFire, etc.)</label>
                    <input type="url" id="p-download" class="form-control" placeholder="https://..." required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-4);">
                    <div class="form-group">
                        <label class="form-label">Game Version</label>
                        <input type="text" id="p-version" class="form-control" placeholder="e.g., v3.8 - v4.0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Brand / Make</label>
                        <input type="text" id="p-brand" class="form-control" placeholder="e.g., Volvo, Scania">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-4);">
                    <div class="form-group">
                        <label class="form-label">Engine / Power</label>
                        <input type="text" id="p-engine" class="form-control" placeholder="e.g., 500 HP V8">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Polygon Quality</label>
                        <select id="p-polygons" class="form-control">
                            <option value="">Select Quality...</option>
                            <option value="Ultra High-Poly">Ultra High-Poly</option>
                            <option value="High-Poly">High-Poly</option>
                            <option value="Optimized">Optimized</option>
                        </select>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-4);">
                    <div class="form-group">
                        <label class="form-label">File Size</label>
                        <input type="text" id="p-size" class="form-control" placeholder="e.g., 45 MB">
                    </div>
                    <div style="display: flex; gap: var(--spacing-6); align-items: center; margin-top: 1.5rem;">
                        <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0;">
                            <input type="checkbox" id="p-interior" style="width: 18px; height: 18px;">
                            <label class="form-label" style="margin-bottom: 0;">Includes Interior</label>
                        </div>
                        <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0;">
                            <input type="checkbox" id="p-featured" style="width: 18px; height: 18px;">
                            <label class="form-label" style="margin-bottom: 0;">Featured Product</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Mod Summary (Short description under images)</label>
                    <textarea id="p-summary" class="form-control" rows="2" placeholder="A quick, catchy summary..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">YouTube Video URL (Optional)</label>
                    <input type="url" id="p-youtube" class="form-control" placeholder="https://youtube.com/watch?v=...">
                </div>

                <div class="form-group">
                    <label class="form-label">Full Description</label>
                    <textarea id="p-description" class="form-control" rows="4" required></textarea>
                </div>

                <div class="form-group" style="border: 1px solid var(--color-border); padding: var(--spacing-4); border-radius: var(--radius-md); background: var(--bg-secondary);">
                    <label class="form-label" style="font-size: 1rem; margin-bottom: 0.5rem; color: var(--color-accent);">You May Also Like (Related Mods)</label>
                    <p class="text-secondary" style="font-size: 0.85rem; margin-bottom: 1rem;">Select exactly which mods should appear as related products.</p>
                    <div id="p-related-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; max-height: 200px; overflow-y: auto;">
                        <!-- Checkboxes will be injected here by JS -->
                    </div>
                </div>

                <div
                    style="display: flex; justify-content: flex-end; gap: var(--spacing-4); margin-top: var(--spacing-6);">
                    <button type="button" class="btn btn-outline" id="cancel-modal-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-product-btn">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Logic -->
    <script type="module">
        import { requireAdmin } from '../js/admin/admin-auth.js';
        requireAdmin();
    </script>
    <script type="module" src="../js/admin/admin-products.js"></script>
</body>

</html>
