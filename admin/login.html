<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Enroute Store</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        body { padding-top: 0; }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: var(--spacing-8);
            border-top: 4px solid var(--color-danger); /* Distinctive admin line */
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="card auth-card">
            <div class="text-center mb-8">
                <a href="../index.html" class="logo">Enroute<span>.</span></a>
                <h2 class="mt-4">Admin Portal</h2>
                <p class="text-secondary mt-2">Restricted Access</p>
            </div>

            <div id="error-message" style="display:none; color: var(--color-danger); text-align: center; margin-bottom: 1rem;"></div>

            <form id="admin-login-form">
                <div class="form-group">
                    <label class="form-label">Admin Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--spacing-4);" id="login-btn">
                    Authenticate
                </button>
            </form>
            
            <div class="text-center mt-6">
                <a href="../index.html" class="text-secondary" style="font-size: 0.875rem;">Return to Store</a>
            </div>
        </div>
    </div>

    <!-- Logic -->
    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/admin/admin-auth.js"></script>
</body>
</html>
