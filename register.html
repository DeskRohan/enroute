<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Enroute Store</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-4);
            background: radial-gradient(circle at center, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: var(--spacing-8);
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--spacing-8);
        }

        .auth-header .logo {
            display: inline-block;
            margin-bottom: var(--spacing-4);
        }

        .error-message {
            color: var(--color-danger);
            font-size: 0.875rem;
            margin-bottom: var(--spacing-4);
            display: none;
            text-align: center;
        }

        .auth-footer {
            margin-top: var(--spacing-6);
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="card auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo">Enroute<span>.</span></a>
                <h2>Create Account</h2>
                <p class="text-secondary mt-2">Join us to buy premium mods</p>
            </div>

            <div id="error-message" class="error-message"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="Min 6 characters">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--spacing-4);" id="register-btn">
                    Create Account
                </button>

                <div style="display: flex; align-items: center; margin: var(--spacing-6) 0;">
                    <div style="flex: 1; height: 1px; background: var(--color-border);"></div>
                    <span style="padding: 0 var(--spacing-4); color: var(--text-secondary); font-size: 0.875rem;">OR</span>
                    <div style="flex: 1; height: 1px; background: var(--color-border);"></div>
                </div>

                <button type="button" class="btn btn-outline" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem;" id="google-register-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>
    </div>

    <!-- Logic -->
    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const registerForm = document.getElementById('register-form');
        const errorMessage = document.getElementById('error-message');
        const registerBtn = document.getElementById('register-btn');
        const googleRegisterBtn = document.getElementById('google-register-btn');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (password.length < 6) {
                errorMessage.textContent = 'Password must be at least 6 characters.';
                errorMessage.style.display = 'block';
                return;
            }

            errorMessage.style.display = 'none';
            registerBtn.textContent = 'Creating account...';
            registerBtn.disabled = true;

            try {
                // Create user
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Create user document in Firestore with role 'customer'
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    email: user.email,
                    role: 'customer',
                    createdAt: new Date().toISOString()
                });

                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error(error);
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage.textContent = 'Email is already in use.';
                } else {
                    errorMessage.textContent = 'Failed to create account. Please try again.';
                }
                errorMessage.style.display = 'block';
                registerBtn.textContent = 'Create Account';
                registerBtn.disabled = false;
            }
        });

        // Google Sign-In
        googleRegisterBtn.addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            errorMessage.style.display = 'none';
            googleRegisterBtn.disabled = true;
            
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // Check if user exists in Firestore
                const userDocRef = doc(db, 'users', user.uid);
                const userDoc = await getDoc(userDocRef);

                if (!userDoc.exists()) {
                    // Register the new user
                    await setDoc(userDocRef, {
                        uid: user.uid,
                        email: user.email,
                        role: 'customer',
                        createdAt: new Date().toISOString()
                    });
                }
                
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error(error);
                errorMessage.textContent = 'Google sign-in failed. Please try again.';
                errorMessage.style.display = 'block';
                googleRegisterBtn.disabled = false;
            }
        });
    </script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
