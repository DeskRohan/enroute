<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Enroute Store</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        body { padding-top: 70px; }

        .product-detail-section {
            padding: var(--spacing-16) 0;
        }

        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-12);
        }

        .product-image {
            width: 100%;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            overflow: hidden;
            background: var(--bg-secondary);
        }

        .product-info h1 {
            margin-bottom: var(--spacing-2);
        }

        .product-price {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: var(--spacing-6);
        }

        .product-meta {
            display: flex;
            gap: var(--spacing-4);
            margin-bottom: var(--spacing-6);
            padding-bottom: var(--spacing-6);
            border-bottom: 1px solid var(--color-border);
        }

        .meta-item {
            display: flex;
            flex-direction: column;
        }

        .meta-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .meta-value {
            font-weight: 600;
        }

        .product-description {
            margin-bottom: var(--spacing-8);
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .buy-card {
            background: var(--bg-secondary);
            padding: var(--spacing-6);
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            text-align: center;
        }

        .product-gallery {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-4);
        }

        .main-image-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            overflow: hidden;
            background: var(--bg-secondary);
        }
        
        .main-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .main-image-wrapper img:hover {
            transform: scale(1.02);
        }

        .thumbnail-strip {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-4);
        }

        .thumbnail-item {
            aspect-ratio: 16 / 9;
            border-radius: var(--radius-md);
            border: 2px solid transparent;
            overflow: hidden;
            cursor: pointer;
            background: var(--bg-secondary);
            transition: border-color 0.2s ease;
        }

        .thumbnail-item.active {
            border-color: var(--color-primary);
        }

        .thumbnail-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-4);
            margin-bottom: var(--spacing-8);
            background: var(--bg-secondary);
            padding: var(--spacing-6);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
        }

        .spec-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            background: var(--bg-primary);
            padding: var(--spacing-3) var(--spacing-4);
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
        }

        .spec-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .spec-value {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .product-gallery {
            position: sticky;
            top: 100px;
            align-self: start;
        }

        .guarantee-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-3);
            margin-top: var(--spacing-6);
            padding-top: var(--spacing-6);
            border-top: 1px solid var(--color-border);
        }

        .guarantee-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-3);
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .guarantee-item svg {
            color: var(--color-accent);
        }

        .product-summary {
            margin-top: var(--spacing-6);
            padding: var(--spacing-4);
            background: var(--bg-secondary);
            border-left: 4px solid var(--color-primary);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: var(--radius-lg);
            margin-top: var(--spacing-8);
            margin-bottom: var(--spacing-8);
            border: 1px solid var(--color-border);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .related-products-section {
            margin-top: var(--spacing-16);
            padding-top: var(--spacing-12);
            border-top: 1px solid var(--color-border);
        }

        .related-products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--spacing-6);
            margin-top: var(--spacing-8);
        }

        .related-products-grid .product-card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: var(--bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .related-products-grid .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.15);
        }

        .related-products-grid .product-img-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: var(--bg-primary);
        }

        .related-products-grid .product-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .related-products-grid .product-card:hover .product-img-wrapper img {
            transform: scale(1.05);
        }

        .related-products-grid .product-card-body {
            padding: var(--spacing-4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
            .specs-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="container nav">
            <a href="index.html" class="logo">Enroute<span>.</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html" class="active">Store</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Support</a></li>
            </ul>
            <div class="nav-actions">
                <a href="login.html" class="btn btn-outline" id="nav-login-btn">Login</a>
                <a href="dashboard.html" class="btn btn-primary" id="nav-dash-btn" style="display: none; padding: 0.6rem; border-radius: 50%; aspect-ratio: 1/1;" title="Dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </a>
            </div>
        </div>
    </header>

    <section class="product-detail-section">
        <div class="container" id="product-container">
            <!-- Skeleton Loader -->
            <div class="product-grid">
                <div class="product-image" style="height: 400px; animation: pulse 1.5s infinite;"></div>
                <div class="product-info">
                    <div style="height: 40px; background: var(--bg-secondary); margin-bottom: 1rem; border-radius: 4px; animation: pulse 1.5s infinite;"></div>
                    <div style="height: 20px; background: var(--bg-secondary); width: 60%; margin-bottom: 2rem; border-radius: 4px; animation: pulse 1.5s infinite;"></div>
                    <div style="height: 100px; background: var(--bg-secondary); margin-bottom: 2rem; border-radius: 4px; animation: pulse 1.5s infinite;"></div>
                    <div style="height: 60px; background: var(--bg-secondary); border-radius: 4px; animation: pulse 1.5s infinite;"></div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Enroute Store. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Logic -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/product-detail.js"></script>
</body>
</html>
