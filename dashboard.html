<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EnrouteIn</title>

    <!-- Standard SEO Meta Tags -->
    <meta name="description" content="EnrouteIn - Premium Game Mods and Addons. Download high-quality mods for your favorite games.">
    <meta name="keywords" content="gaming, mods, addons, enroute, game modifications">
    <meta name="author" content="Enroute">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph (Facebook/WhatsApp/Discord) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourdomain.com/">
    <meta property="og:title" content="EnrouteIn - Premium Game Mods">
    <meta property="og:description" content="Download high-quality mods and addons for your favorite games.">
    <meta property="og:image" content="https://yourdomain.com/assets/images/fevicon.png">
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://yourdomain.com/">
    <meta name="twitter:title" content="EnrouteIn - Premium Game Mods">
    <meta name="twitter:description" content="Download high-quality mods and addons for your favorite games.">
    <meta name="twitter:image" content="https://yourdomain.com/assets/images/fevicon.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        body { padding-top: 70px; }

        .dashboard-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: var(--spacing-8);
            margin-top: var(--spacing-8);
            margin-bottom: var(--spacing-16);
        }

        .sidebar {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            padding: var(--spacing-4) 0;
            height: fit-content;
        }

        .user-info {
            padding: 0 var(--spacing-4) var(--spacing-4);
            border-bottom: 1px solid var(--color-border);
            margin-bottom: var(--spacing-4);
        }

        .user-email {
            font-size: 0.875rem;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-menu li a {
            display: block;
            padding: var(--spacing-3) var(--spacing-4);
            color: var(--text-secondary);
            font-weight: 500;
        }

        .nav-menu li a:hover,
        .nav-menu li a.active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--color-primary);
            border-right: 3px solid var(--color-primary);
        }

        .main-content {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            padding: var(--spacing-6);
        }

        .order-card {
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--spacing-4);
            margin-bottom: var(--spacing-4);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-card-info h4 {
            margin-bottom: var(--spacing-1);
        }

        .empty-state {
            text-align: center;
            padding: var(--spacing-12) 0;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }
        }

        /* Invoice Styles */
        .invoice-wrapper {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 9999;
            overflow-y: auto;
            padding: 2rem;
        }
        .invoice-wrapper.active {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .invoice {
            background: #ffffff;
            color: #1a1a2e;
            max-width: 700px;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            font-family: 'Inter', sans-serif;
        }
        .invoice-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 2.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .invoice-brand h2 { font-size: 1.75rem; font-weight: 800; margin: 0; }
        .invoice-brand h2 span { color: #3b82f6; }
        .invoice-badge {
            background: rgba(59,130,246,0.15);
            color: #60a5fa;
            padding: 0.35rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .invoice-body { padding: 2rem; }
        .invoice-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .invoice-meta-group h4 {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
            color: #9ca3af; margin: 0 0 0.35rem 0; font-weight: 700;
        }
        .invoice-meta-group p { font-size: 0.9rem; color: #1a1a2e; margin: 0; font-weight: 500; }
        .invoice-table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
        .invoice-table thead th {
            text-align: left; font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 0.1em; color: #9ca3af; padding: 0.75rem 0;
            border-bottom: 2px solid #e5e7eb; font-weight: 700;
        }
        .invoice-table thead th:last-child { text-align: right; }
        .invoice-table tbody td { padding: 1rem 0; border-bottom: 1px solid #f3f4f6; font-size: 0.9rem; }
        .invoice-table tbody td:last-child { text-align: right; font-weight: 600; }
        .invoice-totals {
            display: flex; flex-direction: column; align-items: flex-end;
            gap: 0.5rem; padding-top: 1rem; border-top: 2px solid #1a1a2e;
        }
        .invoice-total-row { display: flex; justify-content: space-between; width: 250px; font-size: 0.9rem; }
        .invoice-total-row.grand {
            font-size: 1.25rem; font-weight: 800; color: #1a1a2e;
            padding-top: 0.5rem; border-top: 1px solid #e5e7eb;
        }
        .invoice-footer {
            background: #f9fafb; padding: 1.5rem 2rem; text-align: center;
            font-size: 0.8rem; color: #9ca3af; border-top: 1px solid #e5e7eb;
        }
        .invoice-actions {
            display: flex; gap: 1rem; justify-content: center;
            padding: 1.5rem 2rem; background: #f9fafb; border-top: 1px solid #e5e7eb;
        }
        .invoice-actions button {
            padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600;
            cursor: pointer; font-size: 0.9rem; border: none;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .btn-print { background: #1a1a2e; color: #fff; }
        .btn-close-invoice { background: #e5e7eb; color: #1a1a2e; }

        @media print {
            body * { visibility: hidden; }
            .invoice-wrapper, .invoice-wrapper * { visibility: visible; }
            .invoice-wrapper { position: absolute; top: 0; left: 0; background: white; padding: 0; }
            .invoice { box-shadow: none; border-radius: 0; }
            .invoice-actions { display: none; }
        }
    </style>
    <link rel="icon" type="image/png" href="assets/images/fevicon.png">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="container nav">
            <a href="index.html" class="logo">EnrouteIn<span>.</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Store</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Support</a></li>
            </ul>
            <div class="nav-actions">
                <button class="btn btn-outline" id="logout-btn">Logout</button>
            </div>
        </div>
    </header>

    <div class="container dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="user-info">
                <h3>My Profile</h3>
                <p class="user-email" id="user-email-display">Loading...</p>
                <div id="admin-link-container" style="display: none; margin-top: 10px;">
                    <a href="admin/dashboard.html" class="btn btn-accent btn-sm" style="font-size: 0.75rem; padding: 0.25rem 0.5rem;">Admin Panel</a>
                </div>
            </div>
            <ul class="nav-menu">
                <li><a href="#" class="active" id="tab-purchases">My Purchases</a></li>
                <li><a href="#" id="tab-orders">Order History</a></li>
            </ul>
        </aside>

        <!-- Content -->
        <main class="main-content" id="dashboard-content">
            <!-- Loading State -->
            <div style="text-align: center; padding: 2rem;">Loading...</div>
        </main>
    </div>

    <!-- Invoice Modal -->
    <div class="invoice-wrapper" id="invoice-wrapper">
        <div class="invoice" id="invoice-content"></div>
    </div>

    <!-- Logic -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/dashboard.js"></script>
    <script src="js/cookie-consent.js"></script>
</body>
</html>
