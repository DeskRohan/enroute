<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Enroute Store</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        body { padding-top: 70px; }

        .success-container {
            max-width: 600px;
            margin: var(--spacing-16) auto;
            text-align: center;
        }

        .success-icon {
            font-size: 4rem;
            color: var(--color-accent);
            margin-bottom: var(--spacing-4);
        }

        .order-details {
            background: var(--bg-secondary);
            padding: var(--spacing-6);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            margin: var(--spacing-8) 0;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--spacing-4);
            padding-bottom: var(--spacing-4);
            border-bottom: 1px solid var(--color-border);
        }

        .detail-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .download-section {
            margin-top: var(--spacing-8);
        }

        /* Invoice Styles */
        .invoice-wrapper {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 9999;
            overflow-y: auto;
            padding: 2rem;
        }

        .invoice-wrapper.active {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .invoice {
            background: #ffffff;
            color: #1a1a2e;
            max-width: 700px;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            font-family: 'Inter', sans-serif;
        }

        .invoice-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 2.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .invoice-brand h2 {
            font-size: 1.75rem;
            font-weight: 800;
            margin: 0;
        }

        .invoice-brand h2 span {
            color: #3b82f6;
        }

        .invoice-badge {
            background: rgba(59,130,246,0.15);
            color: #60a5fa;
            padding: 0.35rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .invoice-body {
            padding: 2rem;
        }

        .invoice-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .invoice-meta-group h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #9ca3af;
            margin: 0 0 0.35rem 0;
            font-weight: 700;
        }

        .invoice-meta-group p {
            font-size: 0.9rem;
            color: #1a1a2e;
            margin: 0;
            font-weight: 500;
        }

        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }

        .invoice-table thead th {
            text-align: left;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #9ca3af;
            padding: 0.75rem 0;
            border-bottom: 2px solid #e5e7eb;
            font-weight: 700;
        }

        .invoice-table thead th:last-child {
            text-align: right;
        }

        .invoice-table tbody td {
            padding: 1rem 0;
            border-bottom: 1px solid #f3f4f6;
            font-size: 0.9rem;
        }

        .invoice-table tbody td:last-child {
            text-align: right;
            font-weight: 600;
        }

        .invoice-totals {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
            padding-top: 1rem;
            border-top: 2px solid #1a1a2e;
        }

        .invoice-total-row {
            display: flex;
            justify-content: space-between;
            width: 250px;
            font-size: 0.9rem;
        }

        .invoice-total-row.grand {
            font-size: 1.25rem;
            font-weight: 800;
            color: #1a1a2e;
            padding-top: 0.5rem;
            border-top: 1px solid #e5e7eb;
        }

        .invoice-footer {
            background: #f9fafb;
            padding: 1.5rem 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #9ca3af;
            border-top: 1px solid #e5e7eb;
        }

        .invoice-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            padding: 1.5rem 2rem;
            background: #f9fafb;
            border-top: 1px solid #e5e7eb;
        }

        .invoice-actions button {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-print {
            background: #1a1a2e;
            color: #fff;
        }

        .btn-close-invoice {
            background: #e5e7eb;
            color: #1a1a2e;
        }

        @media print {
            body * { visibility: hidden; }
            .invoice-wrapper, .invoice-wrapper * { visibility: visible; }
            .invoice-wrapper { position: absolute; top: 0; left: 0; background: white; padding: 0; }
            .invoice { box-shadow: none; border-radius: 0; }
            .invoice-actions { display: none; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="container nav">
            <a href="index.html" class="logo">Enroute<span>.</span></a>
            <div class="nav-actions">
                <a href="dashboard.html" class="btn btn-primary" style="padding: 0.6rem; border-radius: 50%; aspect-ratio: 1/1;" title="Dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </a>
            </div>
        </div>
    </header>

    <div class="container success-container" id="main-content">
        <div class="success-icon">✓</div>
        <h1>Payment Successful!</h1>
        <p class="text-secondary mt-2">Thank you for your purchase. Your order has been processed.</p>

        <div id="order-details-container">
            <!-- Skeleton Loader -->
            <div class="order-details" style="animation: pulse 1.5s infinite;">
                <div style="height: 20px; background: var(--color-border); margin-bottom: 1rem; border-radius: 4px;"></div>
                <div style="height: 20px; background: var(--color-border); margin-bottom: 1rem; border-radius: 4px;"></div>
                <div style="height: 20px; background: var(--color-border); border-radius: 4px;"></div>
            </div>
        </div>
    </div>

    <!-- Invoice Modal -->
    <div class="invoice-wrapper" id="invoice-wrapper">
        <div class="invoice" id="invoice-content">
            <!-- Invoice will be rendered here by JS -->
        </div>
    </div>

    <!-- Logic -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/success.js"></script>
</body>
</html>
